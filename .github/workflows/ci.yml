# CI gate pipeline (ARCHITECTURE §16.2). Every gate below is REQUIRED on `main` via
# branch protection: all jobs green + >= 1 review, no merge without the required tests
# and thresholds. Coverage thresholds are turned on in M0 (see vitest base preset).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Lint + Format + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint + format check (Biome)
        run: pnpm lint
      - name: Build (types needed for typecheck)
        run: pnpm build
      - name: Typecheck (tsc)
        run: pnpm typecheck

  test:
    name: Unit + Contract + Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Unit + contract tests (Vitest)
        run: pnpm test
      - name: Required-tests manifest check
        run: pnpm check:required-tests
      - name: MCP-surface parity check
        run: pnpm check:mcp-parity
      - name: Architecture-boundary check
        run: pnpm check:boundaries
      - name: Design-token conformance check
        run: pnpm check:design-tokens

  integration:
    name: Integration (real Postgres via testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Generate migrations (if not committed)
        run: pnpm db:generate
      - name: Integration tests (Docker-backed Postgres)
        run: pnpm test:integration

  e2e:
    name: E2E + Accessibility (Playwright + axe)
    runs-on: ubuntu-latest
    env:
      # Baked into the web bundle at build time AND read by the SSR server at run time —
      # the e2e suite drives the real browser against the real API on :3001.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Start infrastructure (Postgres, Redis, MinIO, Mailhog)
        run: |
          docker compose up -d postgres redis minio mailhog
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U rytask > /dev/null 2>&1 && break
            sleep 1
          done
          docker compose exec -T postgres pg_isready -U rytask
      - name: Migrate + seed
        env:
          DATABASE_URL: postgres://rytask:rytask@localhost:5432/rytask
        run: pnpm db:migrate && pnpm db:seed
      - name: Start API + worker (compiled, dev-mode env)
        working-directory: apps/api
        env:
          # The suite drives the API as the single seeded founder from one IP, so the
          # production per-user rate limits (300 general / 20 auth per 60s) trip mid-suite.
          # Relax them for the e2e stack only — production keeps the secure defaults.
          THROTTLE_MAX_REQUESTS: '100000'
          AUTH_THROTTLE_MAX_REQUESTS: '100000'
        run: |
          node dist/main.js > /tmp/api.log 2>&1 &
          WORKER=1 node dist/main.js > /tmp/worker.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/healthz > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:3001/healthz
      - name: Install Playwright browser
        run: pnpm --filter @rytask/web exec playwright install --with-deps chromium
      - name: E2E + a11y
        run: pnpm test:e2e
      - name: Server logs (on failure)
        if: failure()
        run: tail -n 100 /tmp/api.log /tmp/worker.log || true

  # --- Post-merge (documented; enable when deploy + nightly infra exist) ---
  # build-and-push:  build & push api/web images, deploy staging->prod + drizzle migrate
  # nightly:         k6 load/perf regression gate + dependency/secret scan
