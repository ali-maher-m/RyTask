name: Feature request / idea
description: Suggest something RyTask should do
title: "[Idea]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Start with the pain, not the solution — it helps find the best fix.
      placeholder: At the end of the week I can't easily see…
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: How do you handle this today?
      description: Workarounds, other tools, etc.
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to help build this
