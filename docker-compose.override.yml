# LOCAL-ONLY override (untracked) — auto-merged by `docker compose`.
# Supplies a strong JWT_SECRET so the production-mode image passes
# assertProductionJwtSecret() (api/worker run as NODE_ENV=production).
# The committed docker-compose.yml does not set one. Do NOT commit this file.
services:
  api:
    environment:
      JWT_SECRET: "fdf2566c05e41066db99c3a6d831ae753c441a9a123e9191896a02aed1b7cb53"
      # E2E only: the whole Playwright suite drives the API as the single seeded founder, so the
      # production per-user rate limits (300 general / 20 auth per 60s) trip mid-suite. Relax them
      # for local/e2e so a serial run isn't throttled; production keeps the secure defaults.
      THROTTLE_MAX_REQUESTS: "100000"
      AUTH_THROTTLE_MAX_REQUESTS: "100000"
      GITHUB_TOKEN_ENC_KEY: "5KOj4DgQ3uDRmbrDaonO9vjK0RdKZYhsCyNAjYZK03Q="
  worker:
    environment:
      JWT_SECRET: "fdf2566c05e41066db99c3a6d831ae753c441a9a123e9191896a02aed1b7cb53"
      GITHUB_TOKEN_ENC_KEY: "5KOj4DgQ3uDRmbrDaonO9vjK0RdKZYhsCyNAjYZK03Q="
  # `pnpm start` (the image CMD) triggers pnpm 11's verify-deps check, which tries to
  # purge node_modules and aborts with no TTY. Run Next directly instead.
  web:
    build:
      # NEXT_PUBLIC_API_URL is baked into the client bundle at build time; the committed
      # image builds it empty (relative /api/v1 on :3000 → 404). Point the browser at the API.
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
    command: ["node", "node_modules/next/dist/bin/next", "start"]
