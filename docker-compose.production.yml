# ============================================
# RyTask production stack — Dokploy entry point
# ============================================
# Deploy with Dokploy as a "Docker Compose" service pointing at this file.
# Dokploy's Traefik terminates TLS and routes domains straight to the services
# over the shared `dokploy-network` — NO host ports are published here.
# Map domains in Dokploy's Domains tab:
#   app.<domain>  -> service `web`,  container port 3000
#   api.<domain>  -> service `api`,  container port 3001
#   docs.<domain> -> service `docs`, container port 3002
#
# Configuration comes from the `.env` file Dokploy writes next to this file
# (Environment tab). Start from `.env.production.example`.
#
# Local sanity check:
#   docker compose -f docker-compose.production.yml --env-file .env.production.example config -q
# ============================================

# Env shared by `api` and `worker` (one image, one config — ADR-012).
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgres://${POSTGRES_USER:-rytask}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-rytask}
  REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  # Production boot guard refuses to start without a strong secret (auth.config.ts).
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - generate with `openssl rand -hex 32`}
  # Public origins (used for invite links, CORS, and the Agent-access page).
  APP_BASE_URL: ${PUBLIC_WEB_URL:?PUBLIC_WEB_URL is required, e.g. https://app.example.com}
  CORS_ORIGIN: ${PUBLIC_WEB_URL}
  MCP_PUBLIC_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required, e.g. https://api.example.com}/api/v1/mcp
  # Rate limiting (Redis fixed window; code defaults shown).
  THROTTLE_MAX_REQUESTS: ${THROTTLE_MAX_REQUESTS:-300}
  AUTH_THROTTLE_MAX_REQUESTS: ${AUTH_THROTTLE_MAX_REQUESTS:-20}
  # Slack capture (optional — stack is inert without it, Principle VII).
  SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
  SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
  SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
  SLACK_OAUTH_CALLBACK_URL: ${PUBLIC_API_URL}/integrations/slack/oauth/callback
  SLACK_TOKEN_ENC_KEY: ${SLACK_TOKEN_ENC_KEY:-}
  # GitHub linking (optional; falls back to SLACK_TOKEN_ENC_KEY when unset).
  GITHUB_TOKEN_ENC_KEY: ${GITHUB_TOKEN_ENC_KEY:-}

x-logging: &logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  # ==========================================
  # PostgreSQL — internal only, never on dokploy-network
  # ==========================================
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rytask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rytask}
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
      -c work_mem=4MB
      -c max_connections=100
      -c log_min_duration_statement=1000
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - rytask-internal
    logging: *logging
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 256M

  # ==========================================
  # Redis — BullMQ queues + cache + realtime fan-out.
  # noeviction is REQUIRED by BullMQ; AOF persists jobs across restarts.
  # ==========================================
  redis:
    image: redis:7
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - rytask-internal
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 64M

  # ==========================================
  # Migrations — one-shot, transactional. NO seed in production
  # (the seed creates founder@rytask.local with a known password).
  # Retry loop absorbs the cold-start DNS race on a fresh network.
  # ==========================================
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: rytask-api
    command:
      - sh
      - -c
      - |
        i=0
        until node node_modules/@rytask/db/dist/migrate.js; do
          i=$$((i+1))
          if [ "$$i" -ge 10 ]; then echo "migrations failed after 10 attempts" >&2; exit 1; fi
          echo "migrate attempt $$i failed, retrying in 3s..."
          sleep 3
        done
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-rytask}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rytask}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rytask-internal
    logging: *logging
    restart: 'no'

  # ==========================================
  # API — REST + WebSockets + MCP HTTP transport (/api/v1/mcp)
  # ==========================================
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    image: rytask-api
    restart: unless-stopped
    init: true
    environment:
      <<: *app-env
      PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Liveness only (/healthz) — NOT dependency health, so a transient DB/Redis
    # blip doesn't cascade into container restarts.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rytask-internal
      - dokploy-network
    logging: *logging
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================
  # Worker — same image as `api`, WORKER=1 boots BullMQ processing
  # ==========================================
  worker:
    image: rytask-api
    restart: unless-stopped
    init: true
    command: ['node', 'dist/main.js']
    environment:
      <<: *app-env
      WORKER: '1'
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - rytask-internal
    logging: *logging
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 192M

  # ==========================================
  # Web — Next.js app. NEXT_PUBLIC_API_URL is inlined at BUILD time,
  # so it MUST be a build arg (runtime env is too late) and any change
  # to it requires an image rebuild.
  # ==========================================
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required, e.g. https://api.example.com}
    image: rytask-web
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      # Server-side (RSC) calls stay on the internal network.
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rytask-internal
      - dokploy-network
    logging: *logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==========================================
  # Docs — Fumadocs site (reads no env vars; fully static-ish Next app)
  # ==========================================
  docs:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.docs
    image: rytask-docs
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
    logging: *logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 96M

  # ==========================================
  # Backups — pg_dump every BACKUP_SCHEDULE_HOURS into the `dbbackups`
  # volume with retention rotation. Point Dokploy's Volume Backups at
  # `dbbackups` to ship them off-host (S3).
  # ==========================================
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-rytask}
      POSTGRES_DB: ${POSTGRES_DB:-rytask}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_SCHEDULE_HOURS: ${BACKUP_SCHEDULE_HOURS:-6}
    volumes:
      - dbbackups:/backups
    entrypoint: ['/bin/sh', '-c']
    # Inline script (no bind mounts — Dokploy re-clones the repo on every deploy).
    # Every `$` is `$$`-escaped so compose interpolation leaves it for the shell.
    command:
      - |
        cat > /usr/local/bin/rytask-backup <<'EOF'
        #!/bin/sh
        set -eu
        ts=$$(date +%Y%m%d-%H%M%S)
        pg_dump -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -Fc -f "/backups/rytask-$$ts.dump"
        find /backups -name 'rytask-*.dump' -mtime +"$$BACKUP_RETENTION_DAYS" -delete
        echo "backup complete: rytask-$$ts.dump"
        EOF
        chmod +x /usr/local/bin/rytask-backup
        echo "0 */$${BACKUP_SCHEDULE_HOURS} * * * /usr/local/bin/rytask-backup" > /etc/crontabs/root
        /usr/local/bin/rytask-backup || echo "initial backup failed (db may not be ready yet)"
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rytask-internal
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M

volumes:
  pgdata:
  redisdata:
  dbbackups:

networks:
  # Private bridge for db/redis/app traffic — never exposed to other Dokploy apps.
  rytask-internal:
  # Dokploy's shared Traefik network; only web/api/docs join it.
  dokploy-network:
    external: true
